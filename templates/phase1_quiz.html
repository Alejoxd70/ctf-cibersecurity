{% extends "base.html" %}
{% block content %}
<h2>Fase 1: Reconocimiento Externo</h2>
<p>Responde correctamente las 3 preguntas para desbloquear el reto práctico.</p>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="/phase1">
    <div class="question">
        <label>1. ¿Cuál es la herramienta estándar en Linux para escanear puertos de un host remoto?</label>
        <input type="text" name="q1" placeholder="Nombre de la herramienta" required>
    </div>

    <div class="question">
        <label>2. ¿Cuál es el puerto por defecto del servicio SSH?</label>
        <input type="text" name="q2" placeholder="Número de puerto" required>
    </div>

    <div class="question">
        <label>3. ¿Qué herramienta de línea de comandos se usa en Kali para identificar tecnologías de un servidor web (CMS, lenguaje, etc.)?</label>
        <input type="text" name="q3" placeholder="Nombre de la herramienta" required>
    </div>

    <button type="submit">Enviar respuestas</button>
</form>
{% endblock %}
