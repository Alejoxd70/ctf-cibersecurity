{% extends "base.html" %}
{% block content %}
<h2>Fase 1: Reconocimiento de la Torre Stark</h2>
<p>Los mejores héroes analizan antes de actuar. Demuestra que conoces las herramientas de reconocimiento para mapear la Torre Stark.</p>
<img src="/static/img/ironman_scan.png" alt="Iron Man escaneando" style="width:100%; max-height:150px; object-fit:cover; margin-bottom:15px;">

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="/phase1">
    <div class="question">
        <label>Ni Batman se lanza a lo loco sin analizar el terreno. Si quisieras descubrir qué puertos están abiertos en un objetivo...</label>
        <input type="text" name="q1" placeholder="nmap ..." required>
    </div>

    <div class="question">
        <label>Deadpool rompe la cuarta pared… tú puedes romper la seguridad si haces esto mal. Si quisieras hacer un escaneo sigiloso...</label>
        <input type="text" name="q2" placeholder="nmap ..." required>
    </div>

    <div class="question">
        <label>Spider-Man tiene sentido arácnido… tú tienes comandos básicos. Si quisieras identificar servicios y versiones en un sistema...</label>
        <input type="text" name="q3" placeholder="nmap ..." required>
    </div>

    <button type="submit">Infiltrar Torre Stark</button>
</form>
{% endblock %}
